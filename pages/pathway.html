<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title id="pageTitle">Pathway — Applied Tech</title>
<link rel="stylesheet" href="../css/main.css" />
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../index.html" class="brand"><span class="brand-dot"></span> Applied Tech</a>
    <nav class="nav">
      <a href="../index.html">Pathway Map</a>
      <a href="../explore.html">Explore</a>
      <a href="../courses.html">All Courses</a>
      <a href="../teachers.html">Teachers</a>
      <a href="../about.html">About</a>
    </nav>
  </div>
</header>

<main id="root"></main>
<footer class="site-footer">Applied Tech</footer>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
(function () {
  const { D, pathway, courseBySlug, qs, courseTile, siteLabel, coursesInPathway } = window.APP;
  const id = qs("id");
  const p = pathway(id);
  const root = document.getElementById("root");

  if (!p) {
    root.innerHTML = `<h1>Pathway not found</h1><p><a href="../index.html">Back to map</a></p>`;
    return;
  }

  document.getElementById("pageTitle").textContent = `${p.title} Pathway — Applied Tech`;

  const entryCourses = (p.entry || []).map(courseBySlug).filter(Boolean);
  const courses = coursesInPathway(id);

  const isMultiStep = courses.length > 1;

  root.innerHTML = `
    <div style="margin-bottom: 8px;">
      <a href="../index.html" style="font-size: 13px; color: var(--text-muted);">← Pathway map</a>
    </div>

    <div style="display:flex; align-items:center; gap:12px; margin-bottom:4px;">
      <div style="width:12px; height:40px; border-radius:4px; background:${p.color};"></div>
      <div>
        <div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color: var(--text-muted);">
          ${p.site === "split" ? "CVHS + CHS" : siteLabel(p.site)} · Pathway
        </div>
        <h1 style="margin:0;">${p.title}</h1>
      </div>
    </div>

    <p class="lede" style="margin-top:16px;">${p.description}</p>

    ${isMultiStep ? `
      <div class="pipeline-note">
        <strong>Pipeline note:</strong> The direct prerequisite chain between
        non-freshman courses in this pathway is still under discussion. Courses
        below are shown in the order implied by the whiteboard, but students
        may take them in a different order with counselor approval.
      </div>
    ` : ""}

    ${entryCourses.length ? `
      <h3>Starting point</h3>
      <div class="card-grid">
        ${entryCourses.map(c => `
          <div class="card">
            <a href="course.html?slug=${c.slug}"><h3>${c.title}</h3></a>
            <p>${c.description.split(".")[0]}.</p>
            <div class="card-footer">
              <span class="badge badge-site-${c.site}">${siteLabel(c.site)}</span>
              <span class="badge">9th grade</span>
            </div>
          </div>
        `).join("")}
      </div>
    ` : ""}

    <h3>${isMultiStep ? "Course sequence" : "Course"}</h3>
    <div style="display:flex; flex-direction: column; gap: 10px; max-width: 620px;">
      ${courses.map((c, i) => `
        <a class="course-tile" data-pathway="${c.pathway}" href="course.html?slug=${c.slug}" style="border-left-width: 6px;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <div>
              <div class="course-tile-title" style="font-size: 16px;">${isMultiStep ? `${i + 1}. ` : ""}${c.title}</div>
              <div style="font-size:13px; color: var(--text-muted); margin-top:4px;">${c.description.split(".").slice(0, 2).join(".")}.</div>
            </div>
            <div class="course-tile-meta">
              <span class="badge badge-site-${c.site}">${siteLabel(c.site)}</span>
            </div>
          </div>
        </a>
      `).join("")}
    </div>
  `;
})();
</script>

</body>
</html>
